---
# Tablet provisioning playbook
# Targets: 3× Lenovo IdeaPad tablets running Termux (Android)
# Controller: P14s WSL2 (Arch Linux)
#
# Prerequisites (manual, ~2 commands per tablet):
#   On each tablet:  pkg install openssh && sshd
#   On P14s WSL2:    ssh-copy-id -p 8022 u0_aNNN@10.205.183.NNN
#
# Run:
#   ansible-playbook -i hosts site.yml
#   ansible-playbook -i hosts site.yml --tags xpra   # xpra only

- name: Tablet bootstrap — Termux layer
  hosts: tablets
  gather_facts: false

  tasks:

    - name: Ping check
      ansible.builtin.ping:

    - name: Update Termux package index
      ansible.builtin.command: pkg update -y
      changed_when: false

    - name: Install Termux core packages
      ansible.builtin.command: >
        pkg install -y
        proot-distro
        openssh
        python
        git
      changed_when: false

    - name: Enable Termux x11-repo
      ansible.builtin.command: pkg install -y x11-repo
      changed_when: false
      tags: x11

    - name: Install Termux-X11 companion (Termux-side client)
      ansible.builtin.command: pkg install -y termux-x11-nightly
      changed_when: false
      tags: x11
      # NOTE: the Android APK must be sideloaded manually — it cannot be
      # installed via pkg. Download from:
      #   https://github.com/termux/termux-x11/releases
      # Install the .apk on the tablet, then launch it before running
      # startxfce4 (or any X app) inside proot.

    - name: Check if Arch already installed via proot-distro
      ansible.builtin.command: proot-distro list
      register: proot_list
      changed_when: false

    - name: Install Arch Linux via proot-distro
      ansible.builtin.command: proot-distro install archlinux
      when: "'archlinux' not in proot_list.stdout"

    - name: Clone T.Dot (HAL)
      ansible.builtin.git:
        repo: https://github.com/ITI-Theory/T.Dot.git
        dest: "{{ ansible_env.HOME }}/prj/git/ITI-Theory/T.Dot"
        update: true
      tags: dotfiles

    - name: Clone U.Dot (dotfiles)
      ansible.builtin.git:
        repo: https://github.com/ITI-Theory/U.Dot.git
        dest: "{{ ansible_env.HOME }}/prj/git/ITI-Theory/U.Dot"
        update: true
      tags: dotfiles

    - name: Symlink HAL0 + HAL dispatcher + HAL1 into Termux PATH
      ansible.builtin.shell: |
        mkdir -p {{ ansible_env.HOME }}/.local/bin
        ln -sfn {{ ansible_env.HOME }}/prj/git/ITI-Theory/T.Dot/bin/HAL0 {{ ansible_env.HOME }}/.local/bin/HAL0
        ln -sfn {{ ansible_env.HOME }}/prj/git/ITI-Theory/T.Dot/bin/HAL  {{ ansible_env.HOME }}/.local/bin/HAL
        ln -sfn {{ ansible_env.HOME }}/prj/git/ITI-Theory/U.Dot/bin/HAL1 {{ ansible_env.HOME }}/.local/bin/HAL1
      changed_when: false
      tags: dotfiles

- name: Arch (PRoot) layer — packages + Xpra + dotlinks
  hosts: tablets
  gather_facts: false

  vars:
    # proot-distro is single-user (root). Its rootfs lives inside Termux app data:
    #   ~/.local/share/proot-distro/installed-rootfs/archlinux/
    # Termux cannot access the real Android / — it is sandboxed.
    # Repos are cloned ONLY in Termux ($HOME/prj/git/ITI-Theory/).
    # The Termux home is bind-mounted into proot at /termux-home.
    # ALL dotfile symlinks inside proot point to /termux-home/ — no repos
    # are cloned inside proot. Interactive sessions must always use --bind:
    #   proot-distro login archlinux --bind ~/:/termux-home
    arch: "proot-distro login archlinux --bind {{ ansible_env.HOME }}:/termux-home --"

  tasks:

    - name: Pacman — update and install desktop + Xpra stack
      ansible.builtin.command: >
        {{ arch }} bash -c "
          pacman -Syu --noconfirm &&
          pacman -S --noconfirm --needed
            xorg-server
            xfce4
            xfce4-terminal
            xpra
            picom
            conky
            ttf-dejavu
            ttf-liberation
            openssh
            git
            python
            python-pip
        "
      changed_when: false
      tags: arch_packages

    - name: Generate SSH key inside Arch (for GitHub — add pubkey manually after)
      ansible.builtin.command: >
        {{ arch }} bash -c "
          mkdir -p /root/.ssh &&
          [ -f /root/.ssh/id_ed25519 ] || ssh-keygen -t ed25519 -C '{{ inventory_hostname }}' -f /root/.ssh/id_ed25519 -N ''
        "
      changed_when: false
      tags: dotfiles

    - name: Show SSH public key (add to GitHub)
      ansible.builtin.command: >
        {{ arch }} bash -c "cat /root/.ssh/id_ed25519.pub"
      register: ssh_pubkey
      changed_when: false
      tags: dotfiles

    - name: Display SSH public key
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} pubkey: {{ ssh_pubkey.stdout }}"
      tags: dotfiles

    - name: Link dotfiles into Arch home (all via /termux-home)
      ansible.builtin.command: >
        {{ arch }} bash -c "
          mkdir -p /root/.config/picom /root/.local/bin &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/picom/picom.conf /root/.config/picom/picom.conf &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/bash/ubuntu/bashrc /root/.bashrc &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/bash/ubuntu/profile /root/.bash_profile &&
          ln -sfn /termux-home/prj/git/ITI-Theory/T.Dot/bin/HAL0 /root/.local/bin/HAL0 &&
          ln -sfn /termux-home/prj/git/ITI-Theory/T.Dot/bin/HAL  /root/.local/bin/HAL  &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/bin/HAL1 /root/.local/bin/HAL1
        "
      changed_when: false
      tags: dotfiles
      # Single source of truth: repos live in Termux, mounted at /termux-home.
      # No git inside proot. WM is XFCE4 (xfwm4) — i3 not used on tablets.

    - name: Verify Xpra is available inside Arch
      ansible.builtin.command: >
        {{ arch }} bash -c "xpra --version"
      register: xpra_ver
      changed_when: false
      tags: xpra

    - name: Show Xpra version
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ xpra_ver.stdout }}"
      tags: xpra

- name: P14s WSL2 — same XFCE stack, direct install (no proot)
  hosts: wsl2
  gather_facts: false

  tasks:

    - name: Pacman — update and install desktop + Xpra stack
      ansible.builtin.command: >
        bash -c "
          pacman -Syu --noconfirm &&
          pacman -S --noconfirm --needed
            xorg-server
            xfce4
            xfce4-terminal
            xpra
            picom
            conky
            ttf-dejavu
            ttf-liberation
            xdotool
            git
            python
            python-pip
        "
      changed_when: false
      tags: arch_packages

    - name: Link dotfiles from U.Dot into WSL2 home
      ansible.builtin.command: >
        bash -c "
          mkdir -p /root/.config/picom /root/.local/bin &&
          ln -sfn /root/prj/git/ITI-Theory/U.Dot/picom/picom.conf /root/.config/picom/picom.conf &&
          ln -sfn /root/prj/git/ITI-Theory/U.Dot/bash/ubuntu/bashrc /root/.bashrc &&
          ln -sfn /root/prj/git/ITI-Theory/U.Dot/bash/ubuntu/profile /root/.bash_profile &&
          ln -sfn /root/prj/git/ITI-Theory/T.Dot/bin/HAL0 /root/.local/bin/HAL0 &&
          ln -sfn /root/prj/git/ITI-Theory/T.Dot/bin/HAL  /root/.local/bin/HAL  &&
          ln -sfn /root/prj/git/ITI-Theory/U.Dot/bin/HAL1 /root/.local/bin/HAL1
        "
      changed_when: false
      tags: dotfiles
