---
# Tablet provisioning playbook
# Targets: 3× Lenovo IdeaPad tablets running Termux (Android)
# Controller: P14s WSL2 (Debian trixie)
#
# Prerequisites (manual, ~2 commands per tablet):
#   On each tablet:  pkg install openssh && sshd
#   On P14s WSL2:    ssh-copy-id -p 8022 u0_aNNN@<IP-from-ifconfig>  (first bootstrap; tablet.local after avahi provisioned)
#
# Run:
#   ansible-playbook -i hosts site.yml
#   ansible-playbook -i hosts site.yml --tags xpra   # xpra only

- name: Tablet bootstrap — Termux layer
  hosts: tablets
  gather_facts: false

  tasks:

    - name: Ping check
      ansible.builtin.ping:

    - name: Capture HOME and PREFIX
      ansible.builtin.shell: "printf 'HOME=%s PREFIX=%s' \"$HOME\" \"$PREFIX\""
      register: _env_raw
      changed_when: false
      tags: always

    - name: Set HOME and PREFIX facts (persist across plays)
      ansible.builtin.set_fact:
        t_home: "{{ _env_raw.stdout | regex_search('HOME=([^ ]+)', '\\1') | first }}"
        t_prefix: "{{ _env_raw.stdout | regex_search('PREFIX=([^ ]+)', '\\1') | first }}"
      tags: always

    - name: Update Termux package index
      ansible.builtin.command: pkg update -y
      changed_when: false

    - name: Install Termux core packages
      ansible.builtin.command: >
        pkg install -y
        proot-distro
        openssh
        python
        git
      changed_when: false

    - name: Enable Termux x11-repo
      ansible.builtin.command: pkg install -y x11-repo
      changed_when: false
      tags: x11

    - name: Install Termux-X11 companion (Termux-side client)
      ansible.builtin.command: pkg install -y termux-x11-nightly
      changed_when: false
      tags: x11
      # NOTE: the Android APK must be sideloaded manually — it cannot be
      # installed via pkg. Download from:
      #   https://github.com/termux/termux-x11/releases
      # Install the .apk on the tablet, then launch it before running
      # startxfce4 (or any X app) inside proot.

    - name: Check if Debian container is installed and functional
      ansible.builtin.shell: proot-distro login debian -- true 2>/dev/null && echo present || echo absent
      register: proot_debian_check
      changed_when: false
      # NOTE: proot-distro list shows ALL distros (installed + available), so
      # grep 'debian' always matches. Login probe is the only reliable check.

    - name: Remove stale proot container (ubuntu/arch/broken debian)
      ansible.builtin.command: proot-distro remove debian
      when: "proot_debian_check.stdout == 'absent'"
      ignore_errors: true
      # Silently fails if no container named 'debian' exists — that's fine.

    - name: Install Debian via proot-distro (clean)
      ansible.builtin.command: proot-distro install debian
      when: "proot_debian_check.stdout == 'absent'"

    - name: Clone T.Dot (HAL)
      ansible.builtin.git:
        repo: https://github.com/ITI-Theory/T.Dot.git
        dest: "{{ t_home }}/prj/git/ITI-Theory/T.Dot"
        update: true
        force: true
      tags: dotfiles

    - name: Generate Termux SSH key (for GitHub deploy key)
      ansible.builtin.shell: |
        mkdir -p {{ t_home }}/.ssh
        if [ ! -f {{ t_home }}/.ssh/id_ed25519 ]; then
          ssh-keygen -t ed25519 -C "termux-{{ inventory_hostname }}" -f {{ t_home }}/.ssh/id_ed25519 -N ''
        fi
      changed_when: false
      tags: [dotfiles, keys]

    - name: Trust github.com host key in Termux
      ansible.builtin.shell: |
        mkdir -p {{ t_home }}/.ssh
        ssh-keyscan -H github.com >> {{ t_home }}/.ssh/known_hosts 2>/dev/null
        sort -u {{ t_home }}/.ssh/known_hosts -o {{ t_home }}/.ssh/known_hosts
      changed_when: false
      tags: [dotfiles, keys]

    - name: Display Termux SSH public key (add as GitHub deploy key for U.Dot)
      ansible.builtin.command: cat {{ t_home }}/.ssh/id_ed25519.pub
      register: _pubkey
      changed_when: false
      tags: [dotfiles, keys]

    - name: Print pubkey for {{ inventory_hostname }}
      ansible.builtin.debug:
        msg: "DEPLOY KEY {{ inventory_hostname }}: {{ _pubkey.stdout }}"
      tags: [dotfiles, keys]

    - name: Clone U.Dot (dotfiles) via SSH deploy key
      ansible.builtin.git:
        repo: git@github.com:ITI-Theory/U.Dot.git
        dest: "{{ t_home }}/prj/git/ITI-Theory/U.Dot"
        update: true
        force: true
        accept_hostkey: true
      tags: dotfiles

    - name: Install HAL forwarding wrappers into Termux PATH
      ansible.builtin.shell: |
        printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "{{ t_home }}/prj/git/ITI-Theory/T.Dot/bin/HAL0" > {{ t_prefix }}/bin/HAL0
        printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "{{ t_home }}/prj/git/ITI-Theory/T.Dot/bin/HAL"  > {{ t_prefix }}/bin/HAL
        printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "{{ t_home }}/prj/git/ITI-Theory/U.Dot/bin/HAL1" > {{ t_prefix }}/bin/HAL1
        chmod +x {{ t_prefix }}/bin/HAL0 {{ t_prefix }}/bin/HAL {{ t_prefix }}/bin/HAL1
      changed_when: false
      tags: dotfiles
      # Forwarding wrappers (not symlinks) so BASH_SOURCE[0] resolves to the real
      # script path. Symlinks break the SCRIPT_DIR/REPO_ROOT/ITI path calculation.
      # Termux PATH = $PREFIX/bin only. Write access confirmed.

- name: Debian (PRoot) layer — packages + Xpra + dotlinks
  hosts: tablets
  gather_facts: false

  vars:
    # proot-distro rootfs lives in Termux app data — appears as root inside.
    # Termux home is bind-mounted at /termux-home (same --bind used here).
    # Repos are cloned ONLY in Termux; all proot dotlinks point to /termux-home.
    # Interactive sessions: proot-distro login debian --bind ~/:/termux-home
    deb: "proot-distro login debian --bind {{ t_home }}:/termux-home --"

  tasks:

    - name: Apt — update and install desktop + Xpra + barrier stack
      ansible.builtin.shell: |
        proot-distro login debian --bind {{ t_home }}:/termux-home -- bash -c "
          export DEBIAN_FRONTEND=noninteractive &&
          apt-get update &&
          apt-get install -y --no-install-recommends \
            xorg awesome xfce4-terminal xpra picom conky-all \
            fonts-dejavu-core fonts-liberation \
            barrier openssh-client git python3 python3-venv \
            neovim build-essential ripgrep fzf dbus-x11 \
            avahi-daemon libnss-mdns
        "
      # -qq removed so apt output is visible (shows progress, not frozen).
      # To suppress again: add -qq after 'apt-get update' and 'apt-get install'.
      changed_when: false
      tags: deb_packages

    - name: Set hostname in proot Debian to {{ inventory_hostname }} (avahi mDNS advertisement)
      ansible.builtin.command: >
        {{ deb }} bash -c "echo {{ inventory_hostname }} > /etc/hostname"
      changed_when: false
      tags: deb_packages

    - name: Install termux-services (runit supervisor)
      ansible.builtin.command: pkg install -y termux-services
      changed_when: false
      tags: boot
      # termux-services ships a ready-made sshd runit service.
      # runit supervises it and auto-restarts on crash.
      # The SVDIR daemon itself is started by Termux:Boot (see next task).

    - name: Enable sshd runit service
      ansible.builtin.shell: |
        sv-enable sshd
        sv up sshd || true
      changed_when: false
      tags: boot
      # sv-enable creates the symlink in $SVDIR; sv up starts it immediately.
      # After this sshd restarts automatically on crash — no more manual sshd.

    - name: Write start-xfce4.sh (idempotent — correct content regardless of pkg version)
      ansible.builtin.shell: |
        cat > /data/data/com.termux/files/usr/bin/start-xfce4.sh << 'EOF'
        #!/data/data/com.termux/files/usr/bin/sh
        exec proot-distro login debian --bind ~/:/termux-home --bind /data/data/com.termux/files/usr/tmp/.X11-unix:/tmp/.X11-unix -- bash -c "DISPLAY=:0 xsetroot -cursor_name left_ptr 2>/dev/null; DISPLAY=:0 xrandr --fb 2560x1600 2>/dev/null; DISPLAY=:0 dbus-run-session -- xfce4-session"
        EOF
        chmod +x /data/data/com.termux/files/usr/bin/start-xfce4.sh
      changed_when: false
      tags: [boot, x11]

    - name: Write runit run scripts — tx11 and tx11-xfce4 (all tablets)
      ansible.builtin.shell: |
        SVDIR=/data/data/com.termux/files/usr/var/service
        mkdir -p $SVDIR/tx11/log
        cat > $SVDIR/tx11/run << 'EOF'
        #!/data/data/com.termux/files/usr/bin/sh
        TMPDIR=/data/data/com.termux/files/usr/tmp
        export TMPDIR
        exec termux-x11 :0 2>&1
        EOF
        chmod +x $SVDIR/tx11/run
        mkdir -p $SVDIR/tx11-xfce4/log
        cat > $SVDIR/tx11-xfce4/run << 'EOF'
        #!/data/data/com.termux/files/usr/bin/sh
        exec 3<> /data/data/com.termux/files/usr/var/run/tx11-xfce4.display
        exec termux-x11 -displayfd 3 -xstartup start-xfce4.sh 2>&1
        EOF
        chmod +x $SVDIR/tx11-xfce4/run
        sv-enable tx11       2>/dev/null || true
        sv-enable tx11-xfce4 2>/dev/null || true
      changed_when: false
      tags: [boot, x11]
      # Idempotent: overwrites run scripts on every provision run.

    - name: Write barrierc client runit script — Tablet1 and Tablet3
      ansible.builtin.shell: |
        SVDIR=/data/data/com.termux/files/usr/var/service
        mkdir -p $SVDIR/barrierc/log
        cat > $SVDIR/barrierc/run << 'EOF'
        #!/data/data/com.termux/files/usr/bin/sh
        exec proot-distro login debian --bind ~/:/termux-home --bind /data/data/com.termux/files/usr/tmp/.X11-unix:/tmp/.X11-unix -- \
          bash -c "DISPLAY=:0 barrierc --no-tray --disable-crypto --name {{ inventory_hostname | capitalize }} -f tablet2.local"
        EOF
        chmod +x $SVDIR/barrierc/run
        sv-enable barrierc 2>/dev/null || true
      when: inventory_hostname != 'tablet2'
      changed_when: false
      tags: [boot, x11]
      # Screen name hardcoded via Ansible: tablet1→Tablet1, tablet3→Tablet3 (Jinja capitalize filter)

    - name: Write barriers server runit script — Tablet2 (permanent KVM hub)
      ansible.builtin.shell: |
        SVDIR=/data/data/com.termux/files/usr/var/service
        mkdir -p $SVDIR/barriers/log
        cat > $SVDIR/barriers/run << 'EOF'
        #!/data/data/com.termux/files/usr/bin/sh
        exec proot-distro login debian --bind ~/:/termux-home --bind /data/data/com.termux/files/usr/tmp/.X11-unix:/tmp/.X11-unix -- \
          bash -c "DISPLAY=:0 barriers --no-tray --disable-crypto --config /root/.config/barrier/barrier.conf -f"
        EOF
        chmod +x $SVDIR/barriers/run
        sv-enable barriers 2>/dev/null || true
      when: inventory_hostname == 'tablet2'
      changed_when: false
      tags: [boot, x11]

    - name: Write barrier server config into proot rootfs — Tablet2
      ansible.builtin.shell: |
        ROOTFS=/data/data/com.termux/files/usr/var/lib/proot-distro/installed-rootfs/debian
        mkdir -p $ROOTFS/root/.config/barrier
        cat > $ROOTFS/root/.config/barrier/barrier.conf << 'BARRIEREOF'
        section: screens
            Tablet1:
            Tablet2:
            Tablet3:
            Laptop-P14s:
        end
        section: aliases
        end
        section: links
            Tablet1:
                right = Tablet2
            Tablet2:
                left = Tablet1
                right = Tablet3
                up = Laptop-P14s
            Tablet3:
                left = Tablet2
            Laptop-P14s:
                down = Tablet2
        end
        section: options
            screenSaverSync = false
            clipboardSharing = false
            switchDelay = 500
        end
        BARRIEREOF
      when: inventory_hostname == 'tablet2'
      changed_when: false
      tags: [boot, x11]

    - name: Install Termux:Boot script (starts runit + wakelock on Android boot)
      ansible.builtin.shell: |
        mkdir -p {{ t_home }}/.termux/boot
        cat > {{ t_home }}/.termux/boot/start-services.sh << 'EOF'
        #!/data/data/com.termux/files/usr/bin/bash
        # Runs at Android boot via Termux:Boot app.
        # Acquires wakelock so Termux stays alive with screen off.
        termux-wake-lock
        # Start runit service supervisor (manages sshd + any sv-enabled services)
        . $PREFIX/etc/profile.d/termux-services.sh
        runsvdir $SVDIR &
        EOF
        chmod +x {{ t_home }}/.termux/boot/start-services.sh
      changed_when: false
      tags: boot
      # IMPORTANT: Termux:Boot APK must be installed on the tablet (sideload or F-Droid).
      # Without the APK the ~/.termux/boot/ scripts never fire.

    - name: Link dotfiles into Debian home (all via /termux-home — single repo copy)
      ansible.builtin.command: >
        {{ deb }} bash -c "
          mkdir -p /root/.config/picom /root/.config/awesome /root/.local/bin &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/picom/picom.conf /root/.config/picom/picom.conf &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/bash/ubuntu/bashrc /root/.bashrc &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/bash/ubuntu/profile /root/.bash_profile &&
          ln -sfn /termux-home/prj/git/ITI-Theory/T.Dot/bin/HAL0 /root/.local/bin/HAL0 &&
          ln -sfn /termux-home/prj/git/ITI-Theory/T.Dot/bin/HAL  /root/.local/bin/HAL  &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/bin/HAL1 /root/.local/bin/HAL1 &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/awesome/rc.lua /root/.config/awesome/rc.lua &&
          ln -sfn /termux-home/prj/git/ITI-Theory/U.Dot/nvim /root/.config/nvim
        "
      changed_when: false
      tags: dotfiles
      # WM is XFCE4 (xfwm4) — i3 not used on tablets.

    - name: Verify Xpra is available inside Debian
      ansible.builtin.command: >
        {{ deb }} bash -c "xpra --version"
      register: xpra_ver
      changed_when: false
      tags: xpra

    - name: Show Xpra version
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ xpra_ver.stdout }}"
      tags: xpra

- name: P14s WSL2 — XFCE stack, direct install (Debian)
  hosts: wsl2
  gather_facts: false

  tasks:

    - name: Add xpra.org apt repository (not in standard Debian repos)
      ansible.builtin.shell: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get install -y --no-install-recommends curl ca-certificates
        CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
        curl -fsSL https://xpra.org/xpra.asc | sudo tee /usr/share/keyrings/xpra.asc > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/xpra.asc] https://xpra.org/ ${CODENAME} main" \
          | sudo tee /etc/apt/sources.list.d/xpra.list > /dev/null
        sudo apt-get update
      # -qq removed so apt output is visible (shows progress, not frozen).
      # To suppress again: add -qq after each apt-get update/install.
      changed_when: false
      tags: deb_packages

    - name: Apt — update and install desktop + Xpra stack
      ansible.builtin.shell: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get install -y --no-install-recommends \
          xfce4 xfce4-terminal xpra picom conky-all \
          fonts-dejavu-core fonts-liberation \
          dbus-x11 xdotool git python3 python3-venv \
          neovim build-essential ripgrep fzf \
          avahi-daemon libnss-mdns
      changed_when: false
      tags: deb_packages

    - name: Enable avahi-daemon in WSL2 (resolves .local mDNS hostnames)
      ansible.builtin.shell: sudo service avahi-daemon start 2>/dev/null || true
      changed_when: false
      tags: deb_packages

    - name: Ensure repo directory structure in WSL2 Linux FS
      ansible.builtin.file:
        path: "~/prj/git/ITI-Theory"
        state: directory
        mode: '0755'
      tags: [dotfiles, keys]

    - name: Clone T.Dot (HAL) into WSL2 Linux FS
      ansible.builtin.git:
        repo: https://github.com/ITI-Theory/T.Dot.git
        dest: "~/prj/git/ITI-Theory/T.Dot"
        update: true
        force: true
      tags: dotfiles

    - name: Generate WSL2 SSH key (for GitHub deploy key)
      ansible.builtin.shell: |
        mkdir -p ~/.ssh
        if [ ! -f ~/.ssh/id_ed25519 ]; then
          ssh-keygen -t ed25519 -C "wsl2-debian-p14s" -f ~/.ssh/id_ed25519 -N ''
        fi
      changed_when: false
      tags: [dotfiles, keys]

    - name: Trust github.com host key in WSL2
      ansible.builtin.shell: |
        mkdir -p ~/.ssh
        ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
        sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts
      changed_when: false
      tags: [dotfiles, keys]

    - name: Display WSL2 SSH public key (add as GitHub deploy key for U.Dot)
      ansible.builtin.command: cat ~/.ssh/id_ed25519.pub
      register: _wsl2_pubkey
      changed_when: false
      tags: [dotfiles, keys]

    - name: Print WSL2 pubkey
      ansible.builtin.debug:
        msg: "DEPLOY KEY wsl2: {{ _wsl2_pubkey.stdout }}"
      tags: [dotfiles, keys]

    - name: Clone U.Dot (dotfiles) into WSL2 Linux FS via SSH deploy key
      ansible.builtin.git:
        repo: git@github.com:ITI-Theory/U.Dot.git
        dest: "~/prj/git/ITI-Theory/U.Dot"
        update: true
        force: true
        accept_hostkey: true
      tags: dotfiles

    - name: Link dotfiles from WSL2 Linux FS repos (no /mnt/c)
      ansible.builtin.shell: |
        mkdir -p "$HOME/.config/picom" "$HOME/.config/awesome" "$HOME/.local/bin"
        ln -sfn "$HOME/prj/git/ITI-Theory/U.Dot/picom/picom.conf" "$HOME/.config/picom/picom.conf"
        ln -sfn "$HOME/prj/git/ITI-Theory/U.Dot/awesome/rc.lua" "$HOME/.config/awesome/rc.lua"
        ln -sfn "$HOME/prj/git/ITI-Theory/U.Dot/nvim" "$HOME/.config/nvim"
        ln -sfn "$HOME/prj/git/ITI-Theory/U.Dot/bash/ubuntu/bashrc"  "$HOME/.bashrc"
        ln -sfn "$HOME/prj/git/ITI-Theory/U.Dot/bash/ubuntu/profile" "$HOME/.bash_profile"
        printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "$HOME/prj/git/ITI-Theory/T.Dot/bin/HAL0" > "$HOME/.local/bin/HAL0"
        printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "$HOME/prj/git/ITI-Theory/T.Dot/bin/HAL"  > "$HOME/.local/bin/HAL"
        printf '#!/usr/bin/env bash\nexec "%s" "$@"\n' "$HOME/prj/git/ITI-Theory/U.Dot/bin/HAL1" > "$HOME/.local/bin/HAL1"
        chmod +x "$HOME/.local/bin/HAL0" "$HOME/.local/bin/HAL" "$HOME/.local/bin/HAL1"
        grep -q '\.local/bin' "$HOME/.bashrc" || echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$HOME/.bashrc"
      changed_when: false
      tags: dotfiles
      # Forwarding wrappers (not symlinks) so BASH_SOURCE[0] resolves correctly.
      # Also ensures ~/.local/bin is in PATH.
